name: language_app
description: "A premium cross-platform language learning application with offline-first translation, sync, flashcards, and writing modules."
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Database & Files
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  
  # Network & Sync
  http: ^1.2.1
  connectivity_plus: ^6.0.3
  
  # Export features
  pdf: ^3.10.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  # Enable asset inclusion if needed later
  # assets:
  #   - assets/
