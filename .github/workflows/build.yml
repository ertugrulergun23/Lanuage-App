name: Flutter APK Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3 -> v4 yapıldı

      - name: Setup Java
        uses: actions/setup-java@v4 # v3 -> v4 yapıldı
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4 # Hata veren kısım v3 -> v4 yapıldı
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk