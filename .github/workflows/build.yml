name: Flutter CI/CD Build

on:
  push:
    branches:
      - main
      - master
      - 'feature/*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Analyze Flutter App
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java Development Kit (required for Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 3: Install Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Step 4: Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Step 5: Run linter/analyzer checks
      - name: Analyze code
        run: flutter analyze

      # Step 6: Build Android APK (checks code compilation validity)
      - name: Build APK
        run: flutter build apk --debug

      # Step 7: Upload build artifact (optional but helpful)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk