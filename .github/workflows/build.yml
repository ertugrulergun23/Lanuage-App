name: Flutter APK Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Repair Android Project, Inject Permissions & Rebuild
        run: |
          # Temiz bir başlangıç için eski android klasörünü siliyoruz
          rm -rf android
          
          # Sıfır kilometre tertemiz android projesini üretiyoruz
          flutter create . --platforms=android --project-name=language_app
          
          # İNTERNET İZNİ ENJEKSİYONU: 
          # Sunucunun az önce ürettiği temiz AndroidManifest.xml dosyasının içine internet iznini kodla gömüyoruz
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          
          # Bağımlılıkları çek ve APK üret
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk